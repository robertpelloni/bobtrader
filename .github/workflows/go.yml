name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build
      run: cd ultratrader-go && go build -v ./...

    - name: Test
      run: cd ultratrader-go && go test -v -coverprofile=coverage.out ./...

    - name: Check Coverage
      run: |
        cd ultratrader-go
        go tool cover -func=coverage.out
