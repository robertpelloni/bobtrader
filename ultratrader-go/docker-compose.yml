version: '3.8'

services:
  ultratrader-go:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    depends_on:
      - influxdb
    environment:
      - INFLUX_ENABLED=true
      - INFLUX_URL=http://influxdb:8086
    command: ["--config", "/app/config/production-live.json"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password12345
      - DOCKER_INFLUXDB_INIT_ORG=bobtrader
      - DOCKER_INFLUXDB_INIT_BUCKET=metrics

volumes:
  influxdb-data:
